name: Daily Job Pipeline

on:
  schedule:
    - cron: '0 14 * * *'  # 7AM PDT daily
  workflow_dispatch:       # allow manual trigger

jobs:
  scrape-and-bridge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install supabase python-dotenv psycopg2-binary

      - name: Apply Supabase migrations
        continue-on-error: true
        run: python setup_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Auto-ingest new waitlist students
        continue-on-error: true
        run: python auto_ingest_waitlist.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Run scraper
        run: python -m src.cli scrape
        env:
          PYTHONPATH: .

      - name: Check resume exists
        id: check_resume
        run: |
          if [ -f "data/resume.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  WARNING: data/resume.txt not found — skipping scorer step"
          fi

      - name: Run scorer
        if: steps.check_resume.outputs.exists == 'true'
        continue-on-error: true
        run: python -m src.cli score
        env:
          PYTHONPATH: .

      - name: Sync jobs to Supabase
        continue-on-error: true
        run: python sync_jobs_to_supabase.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Cleanup old jobs
        continue-on-error: true
        run: python cleanup_old_jobs.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Update H1B employer data
        continue-on-error: true
        run: |
          if [ -f data/h1b_lca_2024.xlsx ]; then
            python scripts/process_h1b_data.py
          else
            python scripts/download_h1b_data.py
            python scripts/process_h1b_data.py
          fi
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run multi-student scorer
        continue-on-error: true
        run: python step3_multi_scorer.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Checkout ai-carrer-ops
        uses: actions/checkout@v4
        with:
          repository: Rajsai1609/ai-carrer-ops
          token: ${{ secrets.GH_PAT }}
          path: ai-carrer-ops

      - name: Run bridge
        run: python bridge/bridge.py
        env:
          PYTHONPATH: .
          CAREER_OPS_PATH: ${{ github.workspace }}/ai-carrer-ops

      - name: Commit bridge last_run.json
        run: |
          cd ai-carrer-ops
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Rajsai1609/ai-carrer-ops.git
          git add -f data/pipeline.md
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Trigger career-ops evaluation
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Rajsai1609/ai-carrer-ops/dispatches \
            -d '{"event_type":"run-pipeline","client_payload":{"triggered_by":"scraper"}}'

      - name: Send student insights emails
        continue-on-error: true
        run: python send_student_insights.py
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
